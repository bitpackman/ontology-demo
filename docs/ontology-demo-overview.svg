  <text class="pill-text" x="552" y="827">RDF</text>
  <rect class="stage" x="630" y="805" width="96" height="34" rx="17"/>
  <text class="pill-text" x="653" y="827">SPARQL</text>
  <rect class="stage" x="740" y="805" width="96" height="34" rx="17"/>
  <text class="pill-text" x="768" y="827">OWL 2</text>
  <rect class="stage" x="850" y="805" width="96" height="34" rx="17"/>
  <text class="pill-text" x="882" y="827">推論</text>
  <rect class="stage" x="960" y="805" width="96" height="34" rx="17"/>
  <text class="pill-text" x="992" y="827">設計</text>
  <rect class="stage" x="1070" y="805" width="96" height="34" rx="17"/>
  <text class="pill-text" x="1102" y="827">運用</text>
  <rect class="stage" x="1180" y="805" width="96" height="34" rx="17"/>
  <text class="pill-text" x="1199" y="827">LLM 連携</text>
